name: Build 32-bit + 64-bit Universal APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0
        with:
          channel: stable
          flutter-version-file: pubspec.yaml

      - name: Inject DanDanPlay API credentials
        run: |
          sed -i "s/kvpx7qkqjh/${{ secrets.DANDANAPI_APPID }}/g" lib/utils/mortis.dart
          sed -i "s/rABUaBLqdz7aCSi3fe88ZDj2gwga9Vax/${{ secrets.DANDANAPI_KEY }}/g" lib/utils/mortis.dart

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Flutter APK (all ABIs)
        run: flutter build apk --split-per-abi

      - name: Download 1.9.4 libmpv (ARM64 compat)
        run: |
          curl -skL -o kazumi_194_arm64.apk \
            "https://github.com/Predidit/Kazumi/releases/download/1.9.4/Kazumi_android_1.9.4.apk"
          unzip -o kazumi_194_arm64.apk "lib/arm64-v8a/libmpv.so" "lib/arm64-v8a/libmediakitandroidhelper.so" -d old_libs/

      - name: Merge 32-bit + 64-bit with old libmpv into fat APK
        run: |
          mkdir -p merged/lib/armeabi-v7a merged/lib/arm64-v8a
          unzip -o build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk -d merged/
          unzip -o build/app/outputs/flutter-apk/app-arm64-v8a-release.apk -d merged/
          cp old_libs/lib/arm64-v8a/libmpv.so merged/lib/arm64-v8a/
          cp old_libs/lib/arm64-v8a/libmediakitandroidhelper.so merged/lib/arm64-v8a/
          cd merged && zip -r ../Kazumi_universal.apk . && cd ..

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore debug.keystore -alias debug \
            -keyalg RSA -keysize 2048 -validity 365 \
            -storepass android -keypass android \
            -dname "CN=Debug" -noprompt
          find $ANDROID_HOME/build-tools -name apksigner | head -1 | xargs -I {} {} sign \
            --ks debug.keystore --ks-pass pass:android --key-pass pass:android \
            Kazumi_universal.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Kazumi_universal
          path: Kazumi_universal.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.1-oldphone
          name: Kazumi 老手机32位适配优化版 v2.1.1
          body: |
            ## 基于 [Predidit/Kazumi](https://github.com/Predidit/Kazumi) v2.1.1

            ### 新增支持
            - 32位 ARM (armeabi-v7a) + 64位 ARM 双ABI同包
            - Android 8.1 (SDK 27) 及以上老系统兼容
            - 骁龙450 / MT6765 等老SOC实测通过
            - 解锁特摄剧标签搜索（假面骑士、奥特曼等）

            ### 修改内容
            - 32位 + 64位双ABI同包，自动匹配
            - Android 11 及以下设备隐藏Vulkan选项，自动回退OpenGL
            - arm64 注入兼容版 libmpv，修复由于过老的SOC不适配的兼容性问题而导致的白屏

            ### 运行要求
            - 推荐 Android 8.1 (SDK 27) 及以上
            - 2GB+ 运行内存

            ### 更新说明
            适配版不定时更新，跟随 Kazumi 上游主版本
            老手机上遇到兼容性问题请提 Issue

            ### 问题反馈
            附上：设备型号 / Android版本及Kazumi内报错信息 / SOC型号 / 问题描述

            ### 鸣谢
            原项目 [Predidit/Kazumi](https://github.com/Predidit/Kazumi) · 弹幕服务 DanDanPlay API
          files: Kazumi_universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
